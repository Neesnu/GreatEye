{% if detail.raw_stats %}
<table class="arr-table">
    <thead>
        <tr><th>Key</th><th>Value</th></tr>
    </thead>
    <tbody>
        {% for key, value in detail.raw_stats.items() %}
        <tr>
            <td><code>{{ key }}</code></td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="detail-empty">No raw statistics available</p>
{% endif %}
