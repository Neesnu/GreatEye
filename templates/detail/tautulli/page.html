<div class="detail-tabs">
    <button class="detail-tab detail-tab--active"
            data-tab="overview"
            onclick="switchTab(this, 'overview')">Overview</button>
    <button class="detail-tab"
            data-tab="activity"
            onclick="switchTab(this, 'activity')">Activity</button>
    <button class="detail-tab"
            data-tab="history"
            onclick="switchTab(this, 'history')">History</button>
    <button class="detail-tab"
            data-tab="recently-added"
            onclick="switchTab(this, 'recently-added')">Recently Added</button>
</div>

<div id="tab-overview" class="detail-tab-content detail-tab-content--active">
    {% include "detail/tautulli/overview.html" %}
</div>

<div id="tab-activity" class="detail-tab-content" style="display: none;">
    {% include "detail/tautulli/activity.html" %}
</div>

<div id="tab-history" class="detail-tab-content" style="display: none;">
    {% include "detail/tautulli/history.html" %}
</div>

<div id="tab-recently-added" class="detail-tab-content" style="display: none;">
    {% include "detail/tautulli/recently_added.html" %}
</div>

<script>
function switchTab(btn, tabName) {
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('detail-tab--active'));
    document.querySelectorAll('.detail-tab-content').forEach(c => {
        c.classList.remove('detail-tab-content--active');
        c.style.display = 'none';
    });
    btn.classList.add('detail-tab--active');
    var el = document.getElementById('tab-' + tabName);
    el.classList.add('detail-tab-content--active');
    el.style.display = '';
}
</script>
