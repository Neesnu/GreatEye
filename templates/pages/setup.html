<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup — Great Eye</title>
    <link rel="stylesheet" href="/static/css/greateye.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1 class="auth-card__title">Great Eye</h1>
            <p class="auth-card__subtitle">Create your admin account to get started</p>

            <form hx-post="/setup/admin"
                  hx-target="#setup-error"
                  hx-swap="innerHTML">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username"
                           name="username" required autocomplete="username"
                           autofocus minlength="3">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password"
                           name="password" required minlength="8"
                           autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input class="form-input" type="password" id="confirm_password"
                           name="confirm_password" required minlength="8"
                           autocomplete="new-password">
                </div>

                <div id="setup-error"></div>

                <div class="form-group">
                    <button type="submit" class="btn btn--primary">Create Account</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
