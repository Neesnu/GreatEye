<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Great Eye</title>
    <link rel="stylesheet" href="/static/css/greateye.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1 class="auth-card__title">Great Eye</h1>
            <p class="auth-card__subtitle">Request a password reset</p>

            <form hx-post="/auth/reset-request"
                  hx-target="#reset-result"
                  hx-swap="innerHTML">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username"
                           name="username" required autocomplete="username"
                           autofocus>
                </div>

                <div id="reset-result"></div>

                <div class="form-group">
                    <button type="submit" class="btn btn--primary">Request Reset</button>
                </div>
            </form>

            <p style="text-align: center; margin-top: var(--space-md);">
                <a href="/auth/login">Back to login</a>
            </p>
        </div>
    </div>
</body>
</html>
