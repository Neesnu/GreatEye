<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — Great Eye</title>
    <link rel="stylesheet" href="/static/css/greateye.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1 class="auth-card__title">Great Eye</h1>
            <p class="auth-card__subtitle">Set a new password</p>

            <form hx-post="/auth/reset/{{ token }}"
                  hx-target="#reset-error"
                  hx-swap="innerHTML">
                <div class="form-group">
                    <label class="form-label" for="new_password">New Password</label>
                    <input class="form-input" type="password" id="new_password"
                           name="new_password" required minlength="8"
                           autocomplete="new-password" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input class="form-input" type="password" id="confirm_password"
                           name="confirm_password" required minlength="8"
                           autocomplete="new-password">
                </div>

                <div id="reset-error"></div>

                <div class="form-group">
                    <button type="submit" class="btn btn--primary">Set Password</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
