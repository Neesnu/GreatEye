{% if forced %}
<div style="margin-bottom: var(--space-md); padding: var(--space-md); background-color: var(--bg-tertiary); border-radius: var(--border-radius); border-left: 3px solid var(--color-warning);">
    <p style="color: var(--color-warning); font-weight: 500;">Password reset required</p>
    <p style="color: var(--text-secondary); font-size: var(--font-size-sm);">An admin has flagged your account for a password change.</p>
</div>
{% endif %}

<form hx-post="/auth/change-password"
      hx-target="#change-error"
      hx-swap="innerHTML">

    {% if not forced %}
    <div class="form-group">
        <label class="form-label" for="current_password">Current Password</label>
        <input class="form-input" type="password" id="current_password"
               name="current_password" required autocomplete="current-password">
    </div>
    {% endif %}

    <div class="form-group">
        <label class="form-label" for="new_password">New Password</label>
        <input class="form-input" type="password" id="new_password"
               name="new_password" required minlength="8"
               autocomplete="new-password">
    </div>

    <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm New Password</label>
        <input class="form-input" type="password" id="confirm_password"
               name="confirm_password" required minlength="8"
               autocomplete="new-password">
    </div>

    <div id="change-error"></div>

    <div class="form-group">
        <button type="submit" class="btn btn--primary">Change Password</button>
    </div>
</form>
