<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Great Eye{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/greateye.css">
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/htmx-sse.js"></script>
    <script src="/static/js/sortable.min.js"></script>
    <script src="/static/js/layout.js"></script>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <button class="sidebar-toggle"
            aria-label="Toggle navigation"
            aria-expanded="false"
            onclick="toggleSidebar()">&#9776;</button>
    <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" aria-label="Main navigation">
            {% include "partials/sidebar.html" %}
        </aside>

        <!-- Main content area -->
        <div class="main-content">
            <header class="header" aria-label="Page header">
                <h1 class="header__title">{% block header_title %}Dashboard{% endblock %}</h1>
                <div class="header__actions">
                    {% block header_actions %}{% endblock %}
                </div>
            </header>

            <main class="content" id="main-content">
                {% block content %}
                    {% if content_template is defined %}
                        {% include content_template %}
                    {% endif %}
                {% endblock %}
            </main>
        </div>
    </div>

    <div id="toast-container" role="status" aria-live="polite"></div>

    <script>
        /* HTMX loading bar */
        document.body.addEventListener("htmx:beforeRequest", function() {
            document.body.classList.add("htmx-request");
        });
        document.body.addEventListener("htmx:afterRequest", function() {
            document.body.classList.remove("htmx-request");
        });

        /* Sidebar toggle + backdrop */
        function toggleSidebar() {
            var sidebar = document.querySelector(".sidebar");
            var btn = document.querySelector(".sidebar-toggle");
            var backdrop = document.querySelector(".sidebar-backdrop");
            var isOpen = sidebar.classList.toggle("sidebar--open");
            btn.setAttribute("aria-expanded", isOpen);
            backdrop.classList.toggle("sidebar-backdrop--visible", isOpen);
        }

        /* Close sidebar on mobile nav click */
        document.querySelector(".sidebar").addEventListener("click", function(e) {
            if (window.innerWidth <= 768 && e.target.closest(".sidebar__link")) {
                toggleSidebar();
            }
        });
    </script>
</body>
</html>
